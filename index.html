<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Учет ремонтов | Авито</title>
  <style>
    :root {
      --bg: #f8fafc; --card: #fff; --text: #0f172a; --muted: #64748b;
      --primary: #3b82f6; --primary-hover: #2563eb; --danger: #ef4444;
      --success: #22c55e; --warning: #f59e0b; --border: #e2e8f0;
      --radius: 8px; --shadow: 0 2px 8px rgba(0,0,0,0.08);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; font-family: system-ui, -apple-system, sans-serif; }
    body { background: var(--bg); color: var(--text); padding: 20px; line-height: 1.5; }
    
    header { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 10px; margin-bottom: 20px; }
    h1 { font-size: 1.5rem; font-weight: 600; }
    .btn { padding: 8px 14px; border: none; border-radius: var(--radius); cursor: pointer; font-weight: 500; transition: 0.2s; }
    .btn-primary { background: var(--primary); color: white; }
    .btn-primary:hover { background: var(--primary-hover); }
    .btn-outline { background: transparent; border: 1px solid var(--border); color: var(--text); }
    .btn-danger { background: var(--danger); color: white; }
    
    .controls { background: var(--card); padding: 16px; border-radius: var(--radius); box-shadow: var(--shadow); margin-bottom: 20px; display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 12px; }
    .controls input, .controls select { width: 100%; padding: 8px 12px; border: 1px solid var(--border); border-radius: var(--radius); }
    
    .table-wrapper { overflow-x: auto; background: var(--card); border-radius: var(--radius); box-shadow: var(--shadow); }
    table { width: 100%; border-collapse: collapse; min-width: 1000px; }
    th, td { padding: 12px; text-align: left; border-bottom: 1px solid var(--border); font-size: 0.9rem; }
    th { background: #f1f5f9; font-weight: 600; position: sticky; top: 0; }
    tr:hover { background: #f8fafc; }
    .status { padding: 4px 8px; border-radius: 12px; font-size: 0.75rem; font-weight: 500; display: inline-block; }
    .status-ordered { background: #dbeafe; color: #1e40af; }
    .status-bought { background: #fef3c7; color: #92400e; }
    .status-instok { background: #dcfce7; color: #166534; }
    .status-search { background: #f3f4f6; color: #4b5563; }
    
    .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.4); display: none; justify-content: center; align-items: center; padding: 20px; z-index: 100; }
    .modal.active { display: flex; }
    .modal-content { background: var(--card); padding: 24px; border-radius: var(--radius); width: 100%; max-width: 700px; max-height: 90vh; overflow-y: auto; }
    .form-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 12px; margin-bottom: 16px; }
    .form-group { display: flex; flex-direction: column; }
    .form-group label { font-size: 0.8rem; color: var(--muted); margin-bottom: 4px; }
    .form-group input, .form-group select, .form-group textarea { padding: 8px; border: 1px solid var(--border); border-radius: 6px; }
    
    .parts-section { margin-top: 16px; border: 1px dashed var(--border); padding: 12px; border-radius: var(--radius); }
    .part-row { display: grid; grid-template-columns: 2fr 1.5fr 1fr 40px; gap: 8px; margin-bottom: 8px; align-items: end; }
    .totals { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-top: 16px; background: #f8fafc; padding: 12px; border-radius: 6px; }
    .total-card { text-align: center; }
    .total-card .val { font-size: 1.1rem; font-weight: 700; }
    .total-card.profit .val { color: var(--success); }
    
    .actions { display: flex; gap: 8px; margin-top: 16px; justify-content: flex-end; }
    .hidden { display: none; }
    .empty { text-align: center; padding: 40px; color: var(--muted); }
    .file-input { display: none; }
  </style>
</head>
<body>

  <header>
    <h1>🛠️ Учет ремонтов</h1>
    <div>
      <button class="btn btn-outline" onclick="exportData()">📥 Экспорт JSON</button>
      <button class="btn btn-outline" onclick="document.getElementById('importFile').click()">📤 Импорт JSON</button>
      <input type="file" id="importFile" class="file-input" accept=".json" onchange="importData(this)">
      <button class="btn btn-primary" onclick="openModal()">+ Новая заявка</button>
    </div>
  </header>

  <div class="controls">
    <input type="text" id="search" placeholder="🔍 Поиск (клиент, техника, причина)" oninput="applyFilters()">
    <select id="filterType" onchange="applyFilters()">
      <option value="">Все типы техники</option>
      <option>Микроволновки</option><option>Колонки</option><option>Музыкальные центры</option>
      <option>Наушники</option><option>Телефоны</option><option>Ноутбуки</option>
      <option>Планшеты</option><option>Стиральные машины</option><option>Роутеры</option>
      <option>ПК</option><option>Мониторы</option><option>Пылесосы</option>
    </select>
    <input type="date" id="filterDateFrom" onchange="applyFilters()">
    <input type="date" id="filterDateTo" onchange="applyFilters()">
    <button class="btn btn-outline" onclick="resetFilters()">Сброс</button>
  </div>

  <div class="table-wrapper">
    <table id="table">
      <thead>
        <tr>
          <th>ID</th><th>Дата приема</th><th>Клиент</th><th>Техника</th>
          <th>Запчасти</th><th>Запчасти ₽</th><th>Транспорт ₽</th>
          <th>Себестоимость ₽</th><th>Стоимость ремонта ₽</th><th>Прибыль ₽</th><th>Действия</th>
        </tr>
      </thead>
      <tbody id="tbody"></tbody>
    </table>
    <div id="emptyState" class="empty hidden">Заявок пока нет. Нажмите «+ Новая заявка»</div>
  </div>

  <!-- Модальное окно -->
  <div id="modal" class="modal" onclick="if(event.target===this) closeModal()">
    <div class="modal-content">
      <h2 id="modalTitle">Новая заявка</h2>
      <form id="orderForm">
        <input type="hidden" id="editId">
        <div class="form-grid">
          <div class="form-group"><label>Телефон клиента</label><input type="tel" id="clientPhone" required></div>
          <div class="form-group"><label>Дата приема</label><input type="date" id="orderDate" required></div>
          <div class="form-group"><label>Предв. дата ремонта</label><input type="date" id="estDate"></div>
          <div class="form-group"><label>Тип техники</label>
            <select id="type" required>
              <option value="">Выберите...</option>
              <option>Микроволновки</option><option>Колонки</option><option>Музыкальные центры</option>
              <option>Наушники</option><option>Телефоны</option><option>Ноутбуки</option>
              <option>Планшеты</option><option>Стиральные машины</option><option>Роутеры</option>
              <option>ПК</option><option>Мониторы</option><option>Пылесосы</option>
            </select>
          </div>
          <div class="form-group" style="grid-column: 1 / -1;"><label>Причина поломки</label><textarea id="reason" rows="2"></textarea></div>
          <div class="form-group"><label>Стоимость ремонта (клиент) ₽</label><input type="number" id="repairCost" step="0.01" required></div>
          <div class="form-group"><label>Транспортные затраты ₽</label><input type="number" id="transportCost" step="0.01" value="0"></div>
        </div>

        <div class="parts-section">
          <h3>Запчасти</h3>
          <div id="partsContainer"></div>
          <button type="button" class="btn btn-outline" onclick="addPartRow()" style="margin-top:8px; font-size:0.85rem;">+ Добавить запчасть</button>
        </div>

        <div class="totals">
          <div class="total-card"><div>Запчасти</div><div class="val" id="sumParts">0 ₽</div></div>
          <div class="total-card"><div>Всего затрат</div><div class="val" id="sumExpenses">0 ₽</div></div>
          <div class="total-card profit"><div>Прибыль</div><div class="val" id="sumProfit">0 ₽</div></div>
        </div>

        <div class="actions">
          <button type="button" class="btn btn-outline" onclick="closeModal()">Отмена</button>
          <button type="submit" class="btn btn-primary">💾 Сохранить</button>
        </div>
      </form>
    </div>
  </div>

  <script>
    const STORAGE_KEY = 'repairOrders_v1';
    let orders = JSON.parse(localStorage.getItem(STORAGE_KEY)) || [];

    const fmt = n => new Intl.NumberFormat('ru-RU', { style: 'currency', currency: 'RUB' }).format(n);
    const toDate = d => d ? new Date(d).toLocaleDateString('ru-RU') : '—';

    function save() { localStorage.setItem(STORAGE_KEY, JSON.stringify(orders)); }

    function renderTable(data = orders) {
      const tbody = document.getElementById('tbody');
      const empty = document.getElementById('emptyState');
      tbody.innerHTML = '';
      
      if (data.length === 0) { empty.classList.remove('hidden'); return; }
      empty.classList.add('hidden');

      data.sort((a, b) => b.createdAt - a.createdAt).forEach(o => {
        const partsSum = o.parts.reduce((s, p) => s + (parseFloat(p.cost) || 0), 0);
        const expenses = partsSum + (parseFloat(o.transportCost) || 0);
        const profit = (parseFloat(o.repairCost) || 0) - expenses;

        const partsStatus = o.parts.map(p => `<span class="status status-${p.status}">${p.name}</span>`).join('<br>');
        
        tbody.innerHTML += `
          <tr>
            <td>${o.id.slice(-6).toUpperCase()}</td>
            <td>${toDate(o.orderDate)}</td>
            <td>${o.clientPhone}</td>
            <td>${o.type}</td>
            <td style="font-size:0.8rem">${partsStatus || 'Нет'}</td>
            <td>${fmt(partsSum)}</td>
            <td>${fmt(o.transportCost)}</td>
            <td>${fmt(expenses)}</td>
            <td style="font-weight:600">${fmt(o.repairCost)}</td>
            <td style="font-weight:600; color: ${profit >= 0 ? 'var(--success)' : 'var(--danger)'}">${fmt(profit)}</td>
            <td>
              <button class="btn btn-outline" style="padding:4px 8px" onclick="editOrder('${o.id}')">✏️</button>
              <button class="btn btn-danger" style="padding:4px 8px" onclick="deleteOrder('${o.id}')">🗑️</button>
            </td>
          </tr>
        `;
      });
    }

    function applyFilters() {
      const q = document.getElementById('search').value.toLowerCase();
      const type = document.getElementById('filterType').value;
      const dFrom = document.getElementById('filterDateFrom').value;
      const dTo = document.getElementById('filterDateTo').value;

      const filtered = orders.filter(o => {
        const matchText = !q || o.clientPhone.toLowerCase().includes(q) || o.type.toLowerCase().includes(q) || (o.reason||'').toLowerCase().includes(q);
        const matchType = !type || o.type === type;
        const matchDate = (!dFrom || o.orderDate >= dFrom) && (!dTo || o.orderDate <= dTo);
        return matchText && matchType && matchDate;
      });
      renderTable(filtered);
    }

    function resetFilters() {
      document.getElementById('search').value = '';
      document.getElementById('filterType').value = '';
      document.getElementById('filterDateFrom').value = '';
      document.getElementById('filterDateTo').value = '';
      renderTable();
    }

    // MODAL & FORM
    const modal = document.getElementById('modal');
    const form = document.getElementById('orderForm');
    const partsContainer = document.getElementById('partsContainer');

    function openModal(order = null) {
      modal.classList.add('active');
      document.getElementById('modalTitle').textContent = order ? 'Редактирование заявки' : 'Новая заявка';
      document.getElementById('editId').value = order?.id || '';
      document.getElementById('clientPhone').value = order?.clientPhone || '';
      document.getElementById('orderDate').value = order?.orderDate || new Date().toISOString().split('T')[0];
      document.getElementById('estDate').value = order?.estDate || '';
      document.getElementById('type').value = order?.type || '';
      document.getElementById('reason').value = order?.reason || '';
      document.getElementById('repairCost').value = order?.repairCost || '';
      document.getElementById('transportCost').value = order?.transportCost || '0';
      
      partsContainer.innerHTML = '';
      if (order?.parts?.length) order.parts.forEach(p => addPartRow(p));
      else addPartRow();
      
      updateTotals();
      form.onsubmit = handleSubmit;
    }

    function closeModal() { modal.classList.remove('active'); form.reset(); }

    function addPartRow(data = {}) {
      const div = document.createElement('div');
      div.className = 'part-row';
      div.innerHTML = `
        <input type="text" placeholder="Название запчасти" value="${data.name||''}" class="part-name" required>
        <select class="part-status">
          <option value="search" ${data.status==='search'?'selected':''}>В поиске</option>
          <option value="ordered" ${data.status==='ordered'?'selected':''}>Заказана</option>
          <option value="bought" ${data.status==='bought'?'selected':''}>Куплена</option>
          <option value="in_stock" ${data.status==='in_stock'?'selected':''}>В наличии</option>
        </select>
        <input type="number" step="0.01" placeholder="₽" value="${data.cost||''}" class="part-cost" oninput="updateTotals()">
        <button type="button" class="btn btn-danger" style="padding:4px" onclick="this.parentElement.remove(); updateTotals()">✕</button>
      `;
      partsContainer.appendChild(div);
    }

    function updateTotals() {
      const costs = Array.from(document.querySelectorAll('.part-cost')).map(i => parseFloat(i.value) || 0);
      const partsSum = costs.reduce((a, b) => a + b, 0);
      const transport = parseFloat(document.getElementById('transportCost').value) || 0;
      const expenses = partsSum + transport;
      const repair = parseFloat(document.getElementById('repairCost').value) || 0;
      
      document.getElementById('sumParts').textContent = fmt(partsSum);
      document.getElementById('sumExpenses').textContent = fmt(expenses);
      const profit = repair - expenses;
      document.getElementById('sumProfit').textContent = fmt(profit);
      document.getElementById('sumProfit').style.color = profit >= 0 ? 'var(--success)' : 'var(--danger)';
    }

    function handleSubmit(e) {
      e.preventDefault();
      const id = document.getElementById('editId').value || Date.now().toString(36) + Math.random().toString(36).substr(2);
      const parts = Array.from(document.querySelectorAll('.part-row')).map(row => ({
        name: row.querySelector('.part-name').value,
        status: row.querySelector('.part-status').value,
        cost: parseFloat(row.querySelector('.part-cost').value) || 0
      })).filter(p => p.name);

      const order = {
        id,
        clientPhone: document.getElementById('clientPhone').value,
        orderDate: document.getElementById('orderDate').value,
        estDate: document.getElementById('estDate').value,
        type: document.getElementById('type').value,
        reason: document.getElementById('reason').value,
        repairCost: parseFloat(document.getElementById('repairCost').value) || 0,
        transportCost: parseFloat(document.getElementById('transportCost').value) || 0,
        parts,
        createdAt: orders.find(o=>o.id===id)?.createdAt || Date.now(),
        updatedAt: Date.now()
      };

      const idx = orders.findIndex(o => o.id === id);
      if (idx > -1) orders[idx] = order;
      else orders.push(order);

      save();
      closeModal();
      applyFilters();
    }

    function editOrder(id) {
      const order = orders.find(o => o.id === id);
      if (order) openModal(order);
    }

    function deleteOrder(id) {
      if (confirm('Удалить заявку?')) {
        orders = orders.filter(o => o.id !== id);
        save();
        applyFilters();
      }
    }

    // EXPORT / IMPORT
    function exportData() {
      const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(orders, null, 2));
      const link = document.createElement('a');
      link.href = dataStr;
      link.download = `repair_orders_${new Date().toISOString().split('T')[0]}.json`;
      link.click();
    }

    function importData(input) {
      const file = input.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = e => {
        try {
          const data = JSON.parse(e.target.result);
          if (!Array.isArray(data)) throw new Error('Неверный формат');
          orders = data;
          save();
          applyFilters();
          alert('✅ Данные импортированы');
        } catch (err) { alert('❌ Ошибка импорта: ' + err.message); }
      };
      reader.readAsText(file);
      input.value = '';
    }

    // INIT
    document.addEventListener('DOMContentLoaded', () => {
      renderTable();
      document.getElementById('repairCost').addEventListener('input', updateTotals);
      document.getElementById('transportCost').addEventListener('input', updateTotals);
    });
  </script>
</body>
</html>
